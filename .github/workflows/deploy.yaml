name: Build and Update GitOps Repo

on:
  push:
    branches:
      - main

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits back to the repo
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # Ensure we have push access

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Update Helm values.yaml
        run: |
          # This replaces the old image tag with the new GitHub SHA
          sed -i "s/^  tag: .*/  tag: ${{ github.sha }}/" portfolio-website-chart/values.yaml

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio-website-chart/values.yaml
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push
